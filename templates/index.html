<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureView — Camera Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0b08;
      --surface:    #141008;
      --panel:      #1a1308;
      --panel2:     #211a0d;
      --border:     #2e2210;
      --border2:    #3d2f15;
      --amber:      #e08c00;
      --amber-hi:   #ffad00;
      --amber-dim:  #7a4e00;
      --amber-glow: rgba(224,140,0,0.15);
      --red:        #c43a1a;
      --red-hi:     #ff4d28;
      --green:      #3a8c4a;
      --green-hi:   #4db862;
      --text:       #c8a96e;
      --text-dim:   #6b5530;
      --text-faint: #3d2e18;
      --font-head:  'Bebas Neue', sans-serif;
      --font-ui:    'Rajdhani', sans-serif;
      --font-mono:  'IBM Plex Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
    }

    /* Noise grain texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9998;
      opacity: 0.6;
    }

    /* ══ LAYOUT ══ */
    .app {
      display: grid;
      grid-template-rows: 48px 1fr 44px;
      grid-template-columns: 220px 1fr 240px;
      height: 100vh;
    }

    /* ══ HEADER ══ */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      gap: 24px;
      position: relative;
      z-index: 10;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--amber-dim) 20%, var(--amber) 50%, var(--amber-dim) 80%, transparent 100%);
    }

    .logo {
      font-family: var(--font-head);
      font-size: 1.6rem;
      letter-spacing: 4px;
      color: var(--amber-hi);
      line-height: 1;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--amber-dim);
      font-size: 1.1rem;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border2);
    }

    .header-chips {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      background: var(--panel);
      letter-spacing: 1px;
    }

    .chip.live { border-color: var(--amber-dim); color: var(--amber); }
    .chip.live .chip-dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: throb 1.4s ease-in-out infinite; }
    .chip.offline .chip-dot { background: var(--red); }
    .chip.armed { border-color: var(--red); color: var(--red-hi); }
    .chip.recording-chip { border-color: var(--red); color: var(--red-hi); }
    .chip.recording-chip .chip-dot { background: var(--red-hi); animation: throb 0.8s ease-in-out infinite; }

    .chip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
    }

    @keyframes throb {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #header-clock {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--amber);
      letter-spacing: 2px;
    }

    /* ══ LEFT PANEL ══ */
    .left-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ══ VIDEO PANEL ══ */
    .video-panel {
      background: #000;
      position: relative;
      overflow: hidden;
    }

    #stream {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #boxCanvas {
      position: absolute;
      inset: 0;
      z-index: 20;
      cursor: crosshair;
      display: none;
    }

    .draw-hint {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(14,11,8,0.88);
      border: 1px solid var(--amber);
      border-radius: 2px;
      padding: 12px 22px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--amber-hi);
      letter-spacing: 2px;
      z-index: 25;
      pointer-events: none;
      text-align: center;
    }

    /* HUD corners */
    .hud-corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--amber-dim);
      border-style: solid;
      z-index: 5;
      opacity: 0.5;
    }
    .hud-corner.tl { top:8px; left:8px;  border-width:1px 0 0 1px; }
    .hud-corner.tr { top:8px; right:8px; border-width:1px 1px 0 0; }
    .hud-corner.bl { bottom:8px; left:8px; border-width:0 0 1px 1px; }
    .hud-corner.br { bottom:8px; right:8px; border-width:0 1px 1px 0; }

    /* Alarm overlay */
    .alarm-overlay {
      display: none;
      position: absolute;
      inset: 0;
      border: 3px solid var(--red-hi);
      z-index: 40;
      pointer-events: none;
      animation: alarm-pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes alarm-pulse {
      from { box-shadow: inset 0 0 40px rgba(196,58,26,0.2); border-color: var(--red); }
      to   { box-shadow: inset 0 0 80px rgba(255,77,40,0.4); border-color: var(--red-hi); }
    }

    .alarm-label {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-head);
      font-size: 2.4rem;
      letter-spacing: 8px;
      color: var(--red-hi);
      z-index: 41;
      text-shadow: 0 0 30px rgba(255,77,40,0.8);
      pointer-events: none;
      animation: alarm-pulse 0.5s ease-in-out infinite alternate;
    }

    /* ══ RIGHT PANEL ══ */
    .right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .right-panel::-webkit-scrollbar { width: 3px; }
    .right-panel::-webkit-scrollbar-thumb { background: var(--border2); }

    /* ══ FOOTER ══ */
    footer {
      grid-column: 1 / -1;
      background: var(--surface);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      position: relative;
    }

    footer::before {
      content: '';
      position: absolute;
      top: -2px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
    }

    .foot-btn {
      padding: 6px 14px;
      border: 1px solid var(--border2);
      background: var(--panel);
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .foot-btn:hover {
      border-color: var(--amber-dim);
      color: var(--amber);
      background: var(--amber-glow);
    }

    .foot-btn.on {
      border-color: var(--amber);
      color: var(--amber-hi);
      background: var(--amber-glow);
    }

    .foot-btn.rec-btn {
      border-color: var(--red);
      color: var(--red-hi);
    }

    .foot-btn.rec-btn:hover,
    .foot-btn.rec-btn.recording {
      background: rgba(196,58,26,0.15);
      border-color: var(--red-hi);
    }

    .foot-btn.snap-btn {
      border-color: var(--green);
      color: var(--green-hi);
    }

    .foot-btn.snap-btn:hover {
      background: rgba(58,140,74,0.15);
    }

    .foot-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .foot-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    /* ══ SECTION ══ */
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--amber-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '//';
      color: var(--text-faint);
    }

    /* ══ STATS ══ */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat-block {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 12px 8px;
    }

    .stat-block .sb-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-block .sb-val {
      font-family: var(--font-head);
      font-size: 1.6rem;
      line-height: 1;
      color: var(--amber);
      letter-spacing: 2px;
    }

    .stat-block .sb-val.green { color: var(--green-hi); }
    .stat-block .sb-val.red   { color: var(--red-hi); }
    .stat-block .sb-val.sm    { font-size: 1rem; padding-top: 4px; font-family: var(--font-mono); letter-spacing: 1px; }

    /* ══ LEFT PANEL CONTENT ══ */
    .left-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .left-title {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--amber-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .left-title::before { content: '//'; color: var(--text-faint); }

    /* ══ TOGGLES ══ */
    .tog-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .tog-row:last-child { border-bottom: none; }

    .tog-label { color: var(--text); display: flex; align-items: center; gap: 6px; }
    .tog-label .tl-icon { font-size: 0.75rem; }

    .tog {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }

    .tog input { opacity:0; width:0; height:0; }

    .tog-track {
      position: absolute;
      inset: 0;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tog-track::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 2px; top: 2px;
      background: var(--text-faint);
      border-radius: 1px;
      transition: all 0.2s;
    }

    .tog input:checked + .tog-track {
      background: var(--amber-glow);
      border-color: var(--amber-dim);
    }

    .tog input:checked + .tog-track::before {
      transform: translateX(14px);
      background: var(--amber);
    }

    /* ══ LOG ══ */
    .log-list {
      max-height: 180px;
      overflow-y: auto;
    }

    .log-list::-webkit-scrollbar { width: 2px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border2); }

    .log-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .log-item:last-child { border-bottom: none; }
    .log-item .li-time { color: var(--amber); flex-shrink: 0; }
    .log-item .li-dot  { color: var(--amber-dim); }
    .log-empty {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-faint);
      text-align: center;
      padding: 18px 0;
      letter-spacing: 1px;
    }

    /* ══ ALARM SELECT ══ */
    .alarm-sel {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      appearance: none;
      outline: none;
      letter-spacing: 1px;
    }

    .alarm-sel:focus { border-color: var(--amber-dim); }

    /* ══ RECORDINGS LIST ══ */
    .rec-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
    }

    .rec-list::-webkit-scrollbar { width: 2px; }
    .rec-list::-webkit-scrollbar-thumb { background: var(--border2); }

    .rec-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-dim);
    }

    .rec-item .ri-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rec-item .ri-size { color: var(--text-dim); flex-shrink: 0; }

    .ri-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 1px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .ri-btn.dl:hover  { color: var(--amber); border-color: var(--amber-dim); }
    .ri-btn.del:hover { color: var(--red-hi); border-color: var(--red); }

    .rec-empty {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-faint);
      text-align: center;
      padding: 14px 0;
    }

    /* ══ ZONE DRAW BTN ══ */
    .zone-draw-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: var(--panel);
      border: 1px dashed var(--border2);
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .zone-draw-btn:hover {
      border-color: var(--amber-dim);
      color: var(--amber);
      background: var(--amber-glow);
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo">SECURE<span>VIEW</span></div>
    <div class="header-divider"></div>
    <div class="header-chips">
      <div class="chip live" id="conn-chip">
        <div class="chip-dot"></div>
        <span id="conn-text">CONNECTING</span>
      </div>
      <div class="chip" id="alarm-chip" style="display:none">
        <div class="chip-dot" style="background:var(--amber)"></div>
        ARMED
      </div>
      <div class="chip recording-chip" id="rec-chip" style="display:none">
        <div class="chip-dot"></div>
        REC
      </div>
    </div>
    <div id="header-clock"></div>
  </header>

  <!-- ══ LEFT PANEL ══ -->
  <div class="left-panel">

    <div class="left-section">
      <div class="left-title">Controls</div>
      <div class="tog-row">
        <span class="tog-label"><span class="tl-icon">⬡</span> Alarm Zone</span>
        <label class="tog"><input type="checkbox" id="tog-alarm" onchange="toggleAlarmBox()"><div class="tog-track"></div></label>
      </div>
      <div class="tog-row">
        <span class="tog-label"><span class="tl-icon">◎</span> Motion Detect</span>
        <label class="tog"><input type="checkbox" id="tog-motion" checked onchange="toggleMovement()"><div class="tog-track"></div></label>
      </div>
      <div class="tog-row">
        <span class="tog-label"><span class="tl-icon">⬜</span> YOLO Boxes</span>
        <label class="tog"><input type="checkbox" id="tog-boxes" checked onchange="toggleYoloBoxes()"><div class="tog-track"></div></label>
      </div>
      <div class="tog-row">
        <span class="tog-label"><span class="tl-icon">⬚</span> Show Zone</span>
        <label class="tog"><input type="checkbox" id="tog-zone" checked onchange="toggleZoneVis()"><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="left-section">
      <div class="left-title">Watch Zone</div>
      <button class="zone-draw-btn" onclick="startBoxDrawing()">⊕ Draw Zone</button>
    </div>

    <div class="left-section">
      <div class="left-title">Alarm Sound</div>
      <select class="alarm-sel" id="alarm-select" onchange="setAlarm(this.value)">
        <option value="">— select —</option>
      </select>
    </div>

    <div class="left-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div class="left-title">Detection Log</div>
      <div class="log-list" id="log-list">
        <div class="log-empty">NO EVENTS</div>
      </div>
    </div>

  </div>

  <!-- ══ VIDEO ══ -->
  <div class="video-panel" id="video-panel">
    <img id="stream" src="/video" alt="feed">
    <canvas id="boxCanvas"></canvas>

    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>

    <div class="alarm-overlay" id="alarm-overlay"></div>
    <div class="alarm-label" id="alarm-label">⚠ MOTION DETECTED</div>
    <div class="draw-hint" id="draw-hint">CLICK & DRAG TO DEFINE WATCH ZONE</div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">

    <div class="section">
      <div class="section-title">Live Stats</div>
      <div class="stat-grid">
        <div class="stat-block">
          <div class="sb-label">FPS</div>
          <div class="sb-val" id="stat-fps">—</div>
        </div>
        <div class="stat-block">
          <div class="sb-label">Detections</div>
          <div class="sb-val green" id="stat-det">0</div>
        </div>
        <div class="stat-block">
          <div class="sb-label">Last Trigger</div>
          <div class="sb-val sm" id="stat-last">—</div>
        </div>
        <div class="stat-block">
          <div class="sb-label">Status</div>
          <div class="sb-val sm" id="stat-status">STANDBY</div>
        </div>
      </div>
    </div>

    <div class="section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div class="section-title" style="justify-content:space-between">
        <span>Recordings</span>
        <button onclick="loadRecordings()" style="background:none;border:none;color:var(--amber-dim);font-family:var(--font-mono);font-size:0.6rem;cursor:pointer;letter-spacing:1px;">↺ REFRESH</button>
      </div>
      <div class="rec-list" id="rec-list">
        <div class="rec-empty">NO RECORDINGS</div>
      </div>
    </div>

  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    <button class="foot-btn" id="btn-alarm-foot" onclick="toggleAlarmBox()">Alarm Off</button>
    <button class="foot-btn" id="btn-motion-foot" onclick="toggleMovement()">Motion On</button>
    <button class="foot-btn" id="btn-boxes-foot" onclick="toggleYoloBoxes()">Boxes On</button>
    <div class="foot-sep"></div>
    <button class="foot-btn rec-btn" id="btn-rec" onclick="toggleRecording()">⏺ Record</button>
    <div class="foot-right">
      <button class="foot-btn snap-btn" onclick="takeSnapshot()">📷 Snapshot</button>
      <button class="foot-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
  </footer>

</div>

<script>
// ── Clock ──
(function clock() {
  const el = document.getElementById("header-clock");
  const tick = () => {
    const d = new Date();
    el.textContent = d.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase()
      + "  " + d.toLocaleTimeString("en-US",{hour12:false});
  };
  tick(); setInterval(tick, 1000);
})();

// ── State ──
let isRecording = false;

// ── Status poll ──
async function pollStatus() {
  try {
    const r = await fetch("/status");
    const s = await r.json();

    // Connection chip
    const chip  = document.getElementById("conn-chip");
    const ctext = document.getElementById("conn-text");
    chip.className = "chip " + (s.connected ? "live" : "offline");
    ctext.textContent = s.connected ? "LIVE" : "OFFLINE";

    // Alarm chip
    document.getElementById("alarm-chip").style.display = s.alarm_box_enabled ? "flex" : "none";

    // Rec chip
    isRecording = s.recording;
    document.getElementById("rec-chip").style.display = isRecording ? "flex" : "none";
    const recBtn = document.getElementById("btn-rec");
    recBtn.textContent = isRecording ? "⏹ Stop Rec" : "⏺ Record";
    recBtn.className = "foot-btn rec-btn" + (isRecording ? " recording" : "");

    // Stats
    document.getElementById("stat-fps").textContent = s.fps;
    document.getElementById("stat-det").textContent = s.detections_today;
    document.getElementById("stat-last").textContent = s.last_trigger || "—";

    const statusEl = document.getElementById("stat-status");
    const overlay  = document.getElementById("alarm-overlay");
    const alabel   = document.getElementById("alarm-label");

    if (s.alarm_active) {
      statusEl.textContent = "⚠ ALARM";
      statusEl.className = "sb-val sm red";
      overlay.style.display = "block";
      alabel.style.display = "block";
    } else if (s.alarm_box_enabled) {
      statusEl.textContent = "ARMED";
      statusEl.className = "sb-val sm";
      statusEl.style.color = "var(--amber)";
      overlay.style.display = "none";
      alabel.style.display = "none";
    } else {
      statusEl.textContent = "STANDBY";
      statusEl.className = "sb-val sm";
      statusEl.style.color = "";
      overlay.style.display = "none";
      alabel.style.display = "none";
    }

    // Toggles
    document.getElementById("tog-alarm").checked  = s.alarm_box_enabled;
    document.getElementById("tog-motion").checked = s.movement_detection_enabled;
    document.getElementById("tog-boxes").checked  = s.yolo_boxes_enabled;
    document.getElementById("tog-zone").checked   = s.show_alarm_box;

    // Footer buttons
    const ba = document.getElementById("btn-alarm-foot");
    ba.textContent = s.alarm_box_enabled ? "Alarm On" : "Alarm Off";
    ba.className = "foot-btn" + (s.alarm_box_enabled ? " on" : "");

    const bm = document.getElementById("btn-motion-foot");
    bm.textContent = s.movement_detection_enabled ? "Motion On" : "Motion Off";
    bm.className = "foot-btn" + (s.movement_detection_enabled ? " on" : "");

    const bb = document.getElementById("btn-boxes-foot");
    bb.textContent = s.yolo_boxes_enabled ? "Boxes On" : "Boxes Off";
    bb.className = "foot-btn" + (s.yolo_boxes_enabled ? " on" : "");

  } catch(e) {}
}

setInterval(pollStatus, 2000);
pollStatus();

// ── Detection log ──
async function pollLog() {
  try {
    const r = await fetch("/detection_log");
    const entries = await r.json();
    const list = document.getElementById("log-list");
    if (!entries.length) {
      list.innerHTML = '<div class="log-empty">NO EVENTS</div>';
      return;
    }
    list.innerHTML = entries.slice(0, 20).map(e => `
      <div class="log-item">
        <span class="li-time">${e.time}</span>
        <span class="li-dot">▸</span>
        <span>${e.objects}x ${e.type}</span>
      </div>`).join("");
  } catch(e) {}
}
setInterval(pollLog, 3000);
pollLog();

// ── Load alarms ──
async function loadAlarms() {
  try {
    const r = await fetch("/list_alarms");
    const files = await r.json();
    const sel = document.getElementById("alarm-select");
    files.forEach(f => {
      const o = document.createElement("option");
      o.value = f; o.textContent = f;
      sel.appendChild(o);
    });
  } catch(e) {}
}
loadAlarms();

async function setAlarm(f) {
  if (!f) return;
  await fetch("/set_alarm", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({filename:f})});
}

// ── Toggles ──
async function post(url) { await fetch(url, {method:"POST"}); setTimeout(pollStatus, 200); }

function toggleAlarmBox()   { post("/toggle_alarm_box"); }
function toggleMovement()   { post("/toggle_movement_detection"); }
function toggleYoloBoxes()  { post("/toggle_yolo_boxes"); }
function toggleZoneVis()    { post("/toggle_box_visibility"); }

// ── Recording ──
async function toggleRecording() {
  if (isRecording) {
    await fetch("/stop_recording", {method:"POST"});
  } else {
    await fetch("/start_recording", {method:"POST"});
  }
  setTimeout(pollStatus, 300);
  setTimeout(loadRecordings, 1500);
}

// ── Recordings list ──
async function loadRecordings() {
  try {
    const r = await fetch("/list_recordings");
    const files = await r.json();
    const list = document.getElementById("rec-list");
    if (!files.length) {
      list.innerHTML = '<div class="rec-empty">NO RECORDINGS</div>';
      return;
    }
    list.innerHTML = files.map(f => `
      <div class="rec-item">
        <span class="ri-name" title="${f.file}">${f.file.replace("rec_","").replace(".mp4","")}</span>
        <span class="ri-size">${f.size_mb}MB</span>
        <a href="/download_recording/${f.file}" download>
          <button class="ri-btn dl">DL</button>
        </a>
        <button class="ri-btn del" onclick="deleteRec('${f.file}')">DEL</button>
      </div>`).join("");
  } catch(e) {}
}

async function deleteRec(filename) {
  if (!confirm(`Delete ${filename}?`)) return;
  await fetch(`/delete_recording/${filename}`, {method:"DELETE"});
  loadRecordings();
}

loadRecordings();
setInterval(loadRecordings, 30000);

// ── Snapshot ──
function takeSnapshot() {
  const a = document.createElement("a");
  a.href = "/snapshot";
  a.click();
}

// ── Fullscreen ──
function toggleFullscreen() {
  const vp = document.getElementById("video-panel");
  if (!document.fullscreenElement) vp.requestFullscreen();
  else document.exitFullscreen();
}

// ── Box drawing ──
let drawing = false, boxStart = null, boxEnd = null;
const canvas = document.getElementById("boxCanvas");
const ctx    = canvas.getContext("2d");

function resizeCanvas() {
  const v = document.getElementById("stream");
  canvas.width  = v.clientWidth;
  canvas.height = v.clientHeight;
}
window.addEventListener("resize", resizeCanvas);
setTimeout(resizeCanvas, 500);

function startBoxDrawing() {
  resizeCanvas();
  canvas.style.display = "block";
  document.getElementById("draw-hint").style.display = "block";
  drawing = true; boxStart = null; boxEnd = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

canvas.addEventListener("mousedown", e => {
  if (!drawing) return;
  const r = canvas.getBoundingClientRect();
  boxStart = {x: e.clientX - r.left, y: e.clientY - r.top};
  document.getElementById("draw-hint").style.display = "none";
});

canvas.addEventListener("mousemove", e => {
  if (!drawing || !boxStart) return;
  const r = canvas.getBoundingClientRect();
  boxEnd = {x: e.clientX - r.left, y: e.clientY - r.top};
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const x = Math.min(boxStart.x, boxEnd.x);
  const y = Math.min(boxStart.y, boxEnd.y);
  const w = Math.abs(boxEnd.x - boxStart.x);
  const h = Math.abs(boxEnd.y - boxStart.y);

  ctx.fillStyle = "rgba(224,140,0,0.06)";
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = "#e08c00";
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 4]);
  ctx.strokeRect(x, y, w, h);

  ctx.setLineDash([]);
  ctx.fillStyle = "#ffad00";
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy]) => {
    ctx.beginPath();
    ctx.rect(cx-3, cy-3, 6, 6);
    ctx.fill();
  });

  ctx.fillStyle = "rgba(14,11,8,0.75)";
  ctx.fillRect(x, y - 20, 88, 18);
  ctx.fillStyle = "#e08c00";
  ctx.font = "10px 'IBM Plex Mono',monospace";
  ctx.fillText("WATCH ZONE", x + 4, y - 6);
});

canvas.addEventListener("mouseup", async e => {
  if (!drawing || !boxStart || !boxEnd) return;
  const x1 = Math.min(boxStart.x, boxEnd.x);
  const y1 = Math.min(boxStart.y, boxEnd.y);
  const x2 = Math.max(boxStart.x, boxEnd.x);
  const y2 = Math.max(boxStart.y, boxEnd.y);
  await fetch("/save_box", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({box_norm:[x1/canvas.width, y1/canvas.height, x2/canvas.width, y2/canvas.height]})
  });
  canvas.style.display = "none";
  drawing = false;
});

// Touch
canvas.addEventListener("touchstart", e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent("mousedown",{clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener("touchmove",  e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent("mousemove",{clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener("touchend",   e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent("mouseup",{})); });
</script>
